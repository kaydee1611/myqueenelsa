<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>First Date Invitation.exe</title>
  <meta name="description" content="Một lời mời first date cute từ Nguyễn Cao Điền gửi Nguyễn Thị Thu Phương.">
  <meta name="theme-color" content="#ff8fc4">
  <style>
    :root{
      --bg1:#fff4fa; --bg2:#ffd2e8; --bg3:#ff9ac8;
      --pink:#ff75b6; --hot:#ff3f9c; --dark:#5a2442; --ink:#372433;
      --muted:#77576b; --cream:#fffaf0; --white:#fff; --line:#6b3354;
      --shadow:5px 5px 0 rgba(78,31,58,.24); --soft:0 18px 50px rgba(145,47,98,.18);
    }
    *{box-sizing:border-box}
    html{min-height:100%;scroll-behavior:smooth}
    body{
      margin:0;min-height:100vh;color:var(--ink);
      font-family:"MS Sans Serif","Segoe UI",Tahoma,Verdana,sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255,255,255,.9) 0 160px, transparent 390px),
        radial-gradient(circle at 90% 90%, rgba(255,117,182,.42) 0 140px, transparent 390px),
        linear-gradient(135deg,var(--bg2),var(--bg1) 52%,#ffc1dc);
      overflow-x:hidden;
    }
    body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.55;background-image:linear-gradient(rgba(255,255,255,.62) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,.62) 1px,transparent 1px);background-size:26px 26px;mask-image:radial-gradient(circle at center,#000 0 30%,transparent 84%)}
    button,input,textarea{font:inherit}button{cursor:pointer}img{max-width:100%;display:block}
    .app{position:relative;z-index:1;width:min(980px,calc(100% - 24px));min-height:100vh;margin:auto;display:grid;place-items:center;padding:24px 0 40px}
    .window{width:100%;background:#ffe5f2;border:2px solid var(--line);border-right-color:#42172e;border-bottom-color:#42172e;border-radius:14px;box-shadow:var(--shadow),var(--soft);overflow:hidden}
    .titlebar{min-height:43px;display:flex;align-items:center;gap:10px;padding:8px 10px;background:linear-gradient(90deg,#dc4e97,var(--pink),#ffabd3);border-bottom:2px solid var(--line);color:#fff;text-shadow:1px 1px rgba(0,0,0,.18);font-weight:800}
    .title-icon{width:17px;height:17px;border-radius:5px;background:#fff3b0;border:2px solid rgba(76,26,53,.7);box-shadow:inset -2px -2px rgba(0,0,0,.1);flex:0 0 auto}.title-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.title-actions{margin-left:auto;display:flex;gap:5px}.title-actions span,.xbtn{width:23px;height:23px;border:2px solid #7c365d;border-top-color:#fff5fb;border-left-color:#fff5fb;background:#ffd7e9;border-radius:5px;display:grid;place-items:center;color:#69264d;font-weight:900}
    .body{padding:clamp(18px,4vw,34px)}
    .boot{max-width:620px;text-align:center}.center{text-align:center;display:grid;justify-items:center}.heart-logo{width:92px;margin:6px auto 14px;animation:pulse 1.2s infinite ease-in-out}.loading{width:min(420px,100%);height:24px;border:2px solid var(--line);background:#fff;padding:3px;border-radius:8px;margin:20px auto 0;box-shadow:inset 2px 2px rgba(0,0,0,.1)}.loading span{display:block;height:100%;width:100%;border-radius:4px;background:repeating-linear-gradient(90deg,var(--hot) 0 12px,var(--pink) 12px 24px);animation:load 1.2s ease-out both}
    h1,h2,h3,p{margin-top:0}h1{font-size:clamp(2rem,6vw,4rem);line-height:.96;margin-bottom:12px}h2{font-size:clamp(1.65rem,5vw,2.8rem);line-height:1;margin-bottom:12px}h3{font-size:1.07rem;margin:22px 0 10px}p{color:var(--muted);line-height:1.65}.lead{font-size:1.05rem}.strong{color:var(--dark);font-weight:900}.badge{display:inline-flex;align-items:center;gap:8px;background:#fff5fb;border:2px solid var(--line);border-radius:999px;padding:8px 12px;box-shadow:3px 3px rgba(91,37,66,.14);font-weight:800;color:#8c2b64}.note{background:rgba(255,255,255,.72);border:2px dashed rgba(102,44,76,.38);border-radius:14px;padding:12px 14px;color:#76586b;margin:14px 0}.small{font-size:.88rem;color:var(--muted)}
    .progress{margin-bottom:22px}.progress-top{display:flex;justify-content:space-between;gap:10px;font-size:.88rem;color:var(--muted);font-weight:800;margin-bottom:7px}.track{height:17px;background:#fff;border:2px solid var(--line);border-radius:999px;overflow:hidden;padding:2px}.bar{height:100%;border-radius:999px;background:repeating-linear-gradient(90deg,var(--hot) 0 14px,var(--pink) 14px 28px);width:var(--p)}
    .form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.form-row.two{grid-template-columns:repeat(2,1fr)}.field{display:grid;gap:7px;margin:14px 0}.field label{font-weight:900;color:var(--dark)}input,textarea{width:100%;border:2px solid var(--line);border-top-color:#4a1d36;border-left-color:#4a1d36;border-radius:10px;background:#fff;color:var(--ink);padding:13px 12px;outline:none;box-shadow:inset 2px 2px rgba(0,0,0,.08)}input:focus,textarea:focus{border-color:var(--hot);box-shadow:0 0 0 4px rgba(255,117,182,.22)}textarea{min-height:112px;resize:vertical}
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin:16px 0}.cards.three{grid-template-columns:repeat(3,minmax(0,1fr))}.card{text-align:left;background:rgba(255,255,255,.92);border:2px solid var(--line);border-top-color:#fff8fc;border-left-color:#fff8fc;border-radius:15px;padding:10px;box-shadow:4px 4px rgba(78,31,58,.18);transition:.12s ease;position:relative;overflow:hidden}.card:hover,.card:focus-visible{transform:translate(-2px,-2px);box-shadow:6px 6px rgba(78,31,58,.22);outline:none}.card.selected{background:#fff1f8;border-color:#b52a72;border-top-color:#ffc1df;border-left-color:#ffc1df}.card.selected:after{content:"✓";position:absolute;top:8px;right:8px;width:29px;height:29px;display:grid;place-items:center;border-radius:9px;background:var(--hot);color:#fff;border:2px solid var(--line);font-weight:900}.card img{width:100%;aspect-ratio:4/3;object-fit:cover;border:2px solid rgba(101,45,75,.33);border-radius:11px;background:#fff5fb;margin-bottom:10px}.ctitle{display:block;font-weight:900;color:var(--dark);font-size:1.02rem;margin-bottom:5px}.cdesc{display:block;color:var(--muted);font-size:.9rem;line-height:1.45}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:22px}.btn{border:2px solid var(--line);border-top-color:#fff8fc;border-left-color:#fff8fc;border-radius:11px;padding:12px 16px;min-height:46px;box-shadow:3px 3px rgba(78,31,58,.2);font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;color:var(--dark);background:#ffe1ef}.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px rgba(78,31,58,.22)}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.primary{background:linear-gradient(#ff8cc2,#ff59aa);color:#fff;text-shadow:1px 1px rgba(0,0,0,.18)}.ghost{background:#fff5fb}.danger{background:#ffd4e4;color:#9b235d}.review{display:grid;gap:9px;margin:16px 0}.row{display:grid;grid-template-columns:minmax(150px,.8fr) 1.2fr;gap:10px;background:rgba(255,255,255,.72);border:2px solid rgba(104,48,80,.23);border-radius:12px;padding:11px}.label{font-weight:900;color:var(--dark)}.value{color:var(--muted);word-break:break-word}.bts{display:grid;grid-template-columns:220px 1fr;gap:16px;align-items:center;background:rgba(255,255,255,.65);border:2px solid rgba(104,48,80,.25);border-radius:15px;padding:14px;margin-top:18px}.bts img{border-radius:12px;border:2px solid rgba(104,48,80,.3);aspect-ratio:16/10;object-fit:cover}.toast{position:fixed;z-index:5;left:50%;bottom:20px;transform:translate(-50%,18px);background:#fff;border:2px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:12px 14px;opacity:0;pointer-events:none;transition:.2s ease;color:var(--dark);font-weight:800;max-width:min(92vw,520px);text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}.music-toggle{position:fixed;z-index:6;right:14px;bottom:14px;border:2px solid var(--line);border-top-color:#fff8fc;border-left-color:#fff8fc;border-radius:999px;background:#fff5fb;color:var(--dark);box-shadow:3px 3px rgba(78,31,58,.22);font-weight:900;padding:10px 13px;display:inline-flex;align-items:center;gap:8px}.music-toggle:hover{transform:translate(-1px,-1px);box-shadow:4px 4px rgba(78,31,58,.24)}.music-toggle.playing{background:linear-gradient(#ff8cc2,#ff59aa);color:#fff;text-shadow:1px 1px rgba(0,0,0,.18)}.modal{position:fixed;inset:0;z-index:10;display:none;place-items:center;background:rgba(65,22,45,.32);padding:16px}.modal.show{display:grid}.modal .window{max-width:500px}.modal p{margin-bottom:0}.modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.rain{position:fixed;z-index:9;top:-40px;animation:fall 1.6s linear forwards;pointer-events:none}
    @keyframes load{from{width:0}to{width:100%}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}@keyframes fall{to{transform:translateY(110vh) rotate(240deg);opacity:0}}
    @media(max-width:760px){.app{width:min(100% - 16px,980px);padding:12px 0 28px;align-items:start}.body{padding:18px}.form-row,.form-row.two,.cards,.cards.three,.row,.bts{grid-template-columns:1fr}.actions{display:grid}.btn{width:100%}.badge{margin-bottom:10px}h1{font-size:2.4rem}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.001ms!important}}
  
    .outfit-plan{
      display:grid; gap:14px;
      background:linear-gradient(135deg,#fff7fc,#ffe1ef);
      border:2px solid var(--dark);
      box-shadow:6px 6px 0 rgba(90,36,66,.18);
      border-radius:18px; padding:16px; margin:14px 0;
    }
    .outfit-grid{
      display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px;
    }
    .outfit-tile{
      background:rgba(255,255,255,.92);
      border:2px solid var(--line);
      border-top-color:#fff8fc; border-left-color:#fff8fc;
      border-radius:15px; padding:12px 10px; text-align:center;
      box-shadow:4px 4px rgba(78,31,58,.18);
    }
    .outfit-icon{
      width:62px; height:62px; margin:0 auto 9px; border-radius:18px;
      border:2px solid rgba(101,45,75,.35);
      background:linear-gradient(135deg,#fff,#ffe1ef);
      display:grid; place-items:center; font-size:32px;
    }
    .outfit-name{display:block; font-weight:900; color:var(--dark);}
    .outfit-desc{display:block; margin-top:4px; color:var(--muted); font-size:.86rem; line-height:1.35;}
    .mini-game{margin-top:18px; border:2px solid var(--dark); border-radius:18px; background:#fff7fc; box-shadow:6px 6px 0 rgba(90,36,66,.18); overflow:hidden;}
    .mini-game-head{display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; padding:14px; border-bottom:2px solid var(--dark); background:#ffd8ea;}
    .game-area{position:relative; height:260px; overflow:hidden; background:linear-gradient(180deg,#fff,#ffeaf4);}
    .game-hint{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; color:var(--muted); font-weight:800;}
    .heart-pop{position:absolute; border:2px solid var(--dark); background:#fff; border-radius:999px; width:52px; height:52px; font-size:26px; cursor:pointer; box-shadow:4px 4px 0 rgba(90,36,66,.18); animation:popFloat 1.2s ease-out forwards;}
    @keyframes popFloat{0%{transform:scale(.55); opacity:.2}18%{transform:scale(1.08); opacity:1}100%{transform:translateY(-34px) scale(.92); opacity:.18}}
    @media(max-width:760px){.outfit-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:560px){.outfit-grid{grid-template-columns:1fr}.game-area{height:230px}}

  </style>
</head>
<body>
  <main id="app" class="app">
    <section class="window boot">
      <div class="titlebar"><span class="title-icon"></span><span class="title-text">PinkOS</span><div class="title-actions"><span></span><span></span><span></span></div></div>
      <div class="body center">
        <img class="heart-logo" alt="Trái tim hồng" id="bootHeart">
        <h1>First Date Invitation.exe</h1>
        <p>Đang tải lời mời đặc biệt...</p>
        <div class="loading"><span></span></div>
      </div>
    </section>
  </main>
  <button id="musicToggle" class="music-toggle" type="button" aria-pressed="false">♪ Bật nhạc</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <section class="window">
      <div class="titlebar"><span class="title-icon"></span><span class="title-text" id="modalTitle">Thông báo</span><button class="xbtn" id="modalX" type="button" aria-label="Đóng">×</button></div>
      <div class="body"><p id="modalMsg"></p><div id="modalActions" class="modal-actions"></div></div>
    </section>
  </div>

  <script>
    // ====== CHỈNH Ở ĐÂY ======
    var CONFIG = {
      recipientName: "Nguyễn Thị Thu Phương",
      senderName: "Nguyễn Cao Điền",
      formspreeEndpoint: "https://formspree.io/f/mzdqyagg", // Dán endpoint Formspree vào đây. Ví dụ: https://formspree.io/f/abcdwxyz
      backgroundMusicUrl: "/background-music.mp3",
      musicVolume: 0.5, // Âm lượng từ 0 đến 1.
      autoStartMusicAfterFirstClick: true // Trình duyệt chỉ cho phát nhạc sau khi người dùng bấm vào trang.
    };

    var app = document.getElementById("app");
    var toast = document.getElementById("toast");
    var modal = document.getElementById("modal");
    var modalTitle = document.getElementById("modalTitle");
    var modalMsg = document.getElementById("modalMsg");
    var modalActions = document.getElementById("modalActions");
    var modalX = document.getElementById("modalX");
    var musicToggle = document.getElementById("musicToggle");
    var bgMusic = null;
    var musicAutoTried = false;

    var DATA = {
      birthDay:"", birthMonth:"", birthYear:"", accepted:false,
      foodChoice:"", foodNote:"", activityChoice:"",
      outfitOpinion:"", perfumeChoice:"",
      date:"", time:"", note:""
    };

    function esc(value){
      return String(value == null ? "" : value)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
    }
    function svg(label, emoji, color1, color2){
      var svgText = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">'
        + '<defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="'+color1+'"/><stop offset="1" stop-color="'+color2+'"/></linearGradient></defs>'
        + '<rect width="480" height="320" rx="34" fill="url(#g)"/>'
        + '<circle cx="72" cy="62" r="38" fill="rgba(255,255,255,.35)"/><circle cx="420" cy="270" r="54" fill="rgba(255,255,255,.30)"/>'
        + '<text x="240" y="150" font-size="82" text-anchor="middle" dominant-baseline="middle">'+emoji+'</text>'
        + '<rect x="54" y="222" width="372" height="58" rx="20" fill="rgba(255,255,255,.74)"/>'
        + '<text x="240" y="258" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#5a2442">'+label+'</text>'
        + '</svg>';
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svgText);
    }

    var HEART = svg("Love mail", "💗", "#ffb4d4", "#fff3fb");
    document.getElementById("bootHeart").src = HEART;

    var OPTIONS = {
      food:[
        {value:"Món Âu", title:"Món Âu 🍝", desc:"Một bữa tối nhẹ nhàng, xinh xắn, dễ có không khí first date.", img:svg("Món Âu","🍝","#ffd6e8","#fff6c9")},
        {value:"Món Trung", title:"Món Trung 🍜", desc:"Đậm vị, ấm bụng, hợp để vừa ăn vừa nói chuyện.", img:svg("Món Trung","🍜","#ffe3b8","#ffd2e8")},
        {value:"Món Hàn", title:"Món Hàn 🍗", desc:"Dễ vui, dễ ăn, hợp kiểu hẹn hò thoải mái.", img:svg("Món Hàn","🍗","#ffc4dc","#fff0b5")},
        {value:"Để anh Điền tính", title:"Để anh Điền tính 😎", desc:"Để anh Điền chọn món và chuẩn bị một bữa ăn thật hợp cho buổi hẹn.", img:svg("Anh Điền tính","😎","#dfffe9","#ffd5e8")}
      ],
      activities:[
        {value:"Đi cafe", title:"Đi cafe ☕", desc:"Ngồi thêm một chút, nói chuyện thêm một chút.", img:svg("Cafe","☕","#ffd5e8","#d8f0ff")},
        {value:"Xem phim", title:"Xem phim 🎬", desc:"Cùng xem một bộ phim rồi có chuyện để nhắc lại.", img:svg("Xem phim","🎬","#ffc6e0","#e8ddff")},
        {value:"Đi dạo", title:"Đi dạo 🌸", desc:"Đi chậm thôi, miễn là đi cùng nhau.", img:svg("Đi dạo","🌸","#dfffe9","#ffd5e8")},
        {value:"Để anh Điền tính", title:"Để anh Điền tính 😎", desc:"Cho anh xử lý phần còn lại, nhưng vẫn phải thật dễ thương.", img:svg("Anh tự quyết","😎","#cde8ff","#ffd1e6")}
      ],
      perfumes:[
        {value:"Ngọt ngào ấm áp", title:"Ngọt ngào ấm áp 🌙", desc:"Mềm, ấm, dễ nhớ, hợp một buổi hẹn nhẹ nhàng.", img:svg("Ấm áp","🌙","#ffe0b8","#ffd8ea")},
        {value:"Mát mẻ sạch sẽ", title:"Mát mẻ sạch sẽ 🫧", desc:"Gọn gàng, dễ chịu, tạo cảm giác gần gũi.", img:svg("Sạch sẽ","🫧","#dff8ff","#ffd8ea")}
      ]
    };

    var steps = [
      {key:"welcome", title:"Love Invitation.exe"},
      {key:"birthday", title:"Xác nhận danh tính"},
      {key:"invite", title:"First date request"},
      {key:"food", title:"Chọn món ăn"},
      {key:"activity", title:"Sau khi ăn"},
      {key:"outfit", title:"Outfit cho anh Điền"},
      {key:"schedule", title:"Chọn ngày giờ"},
      {key:"review", title:"Kiểm tra lại"},
      {key:"thanks", title:"Hoàn tất"}
    ];
    var stepIndex = 0;

    function progress(){ return Math.round((stepIndex / (steps.length - 1)) * 100); }
    function frame(html){
      var step = steps[stepIndex];
      var p = progress();
      app.innerHTML = '<section class="window">'
        + '<div class="titlebar"><span class="title-icon"></span><span class="title-text">'+esc(step.title)+'</span><div class="title-actions"><span></span><span></span><span></span></div></div>'
        + '<div class="body">'
        + (stepIndex < steps.length - 1 ? '<div class="progress"><div class="progress-top"><span>Bước '+(stepIndex+1)+'/'+(steps.length-1)+'</span><span>'+p+'%</span></div><div class="track"><div class="bar" style="--p:'+p+'%"></div></div></div>' : '')
        + html + '</div></section>';
      window.scrollTo({top:0, behavior:"smooth"});
    }
    function go(i){ stepIndex = Math.max(0, Math.min(i, steps.length - 1)); render(); }
    function next(){ go(stepIndex + 1); }
    function back(){ go(stepIndex - 1); }
    function actionRow(label, action, hasBack){
      return '<div class="actions">' + (hasBack ? '<button class="btn ghost" data-action="back" type="button">← Quay lại</button>' : '')
        + '<button class="btn primary" data-action="'+action+'" type="button">'+esc(label)+'</button></div>';
    }
    function cards(group, options, selected, extraClass){
      var cls = extraClass ? ' '+extraClass : '';
      return '<div class="cards'+cls+'">' + options.map(function(o){
        return '<button class="card '+(selected === o.value ? 'selected' : '')+'" type="button" data-choose="'+esc(group)+'" data-value="'+esc(o.value)+'">'
          + '<img src="'+o.img+'" alt="'+esc(o.title)+'">'
          + '<span class="ctitle">'+esc(o.title)+'</span><span class="cdesc">'+esc(o.desc)+'</span></button>';
      }).join('') + '</div>';
    }
    function toastMsg(msg){
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(function(){ toast.classList.remove("show"); }, 2400);
    }
    function showModal(title, msg, actions){
      modalTitle.textContent = title;
      modalMsg.textContent = msg;
      modalActions.innerHTML = "";
      (actions && actions.length ? actions : [{label:"Đóng", className:"primary", fn:hideModal}]).forEach(function(a){
        var b = document.createElement("button");
        b.type = "button"; b.className = "btn " + (a.className || "primary"); b.textContent = a.label;
        b.addEventListener("click", a.fn || hideModal); modalActions.appendChild(b);
      });
      modal.classList.add("show");
    }
    function hideModal(){ modal.classList.remove("show"); }
    modalX.addEventListener("click", hideModal);
    modal.addEventListener("click", function(e){ if(e.target === modal) hideModal(); });

    function setupMusic(){
      if(!CONFIG.backgroundMusicUrl){
        musicToggle.style.display = "none";
        return;
      }
      bgMusic = new Audio(CONFIG.backgroundMusicUrl);
      bgMusic.loop = true;
      bgMusic.preload = "auto";
      bgMusic.volume = Math.max(0, Math.min(1, CONFIG.musicVolume || 0.3));
      bgMusic.addEventListener("play", function(){
        musicToggle.classList.add("playing");
        musicToggle.textContent = "♪ Tắt nhạc";
        musicToggle.setAttribute("aria-pressed", "true");
      });
      bgMusic.addEventListener("pause", function(){
        musicToggle.classList.remove("playing");
        musicToggle.textContent = "♪ Bật nhạc";
        musicToggle.setAttribute("aria-pressed", "false");
      });
      bgMusic.addEventListener("error", function(){
        musicToggle.classList.remove("playing");
        musicToggle.textContent = "♪ Chưa có nhạc";
        musicToggle.setAttribute("aria-pressed", "false");
        musicToggle.disabled = true;
      });
      musicToggle.addEventListener("click", function(){
        if(!bgMusic) return;
        if(bgMusic.paused){ playMusic(); } else { bgMusic.pause(); }
      });
    }
    function playMusic(){
      if(!bgMusic) return;
      bgMusic.play().catch(function(){
        toastMsg("Trình duyệt cần em bấm nút ♪ Bật nhạc để phát nhạc nền nha 🎵");
      });
    }
    function autoStartMusic(){
      if(!bgMusic || musicAutoTried || !CONFIG.autoStartMusicAfterFirstClick) return;
      musicAutoTried = true;
      playMusic();
    }
    setupMusic();

    function rain(n){
      var icons = ["💗","💖","💕","✨"];
      for(var i=0;i<n;i++){
        var s = document.createElement("span");
        s.className = "rain"; s.textContent = icons[Math.floor(Math.random()*icons.length)];
        s.style.left = (Math.random()*100) + "vw"; s.style.fontSize = (18 + Math.random()*16) + "px"; s.style.animationDelay = (Math.random()*.35) + "s";
        document.body.appendChild(s); setTimeout((function(x){return function(){x.remove();};})(s), 1900);
      }
    }

    function renderWelcome(){
      frame('<span class="badge">💌 Love mail received</span>'
        + '<h1>Xin chào<br>'+esc(CONFIG.recipientName)+' 💗</h1>'
        + '<p class="lead">Em vừa nhận được một lời mời đặc biệt từ <span class="strong">'+esc(CONFIG.senderName)+'</span>.</p>'
        + '<p>Để mở thư mời, em xác nhận một chút thông tin nha.</p>'
        + '<div class="note">Trang này là mini game first date do anh Điền chuẩn bị riêng cho em. Các lựa chọn của em sẽ được gửi về email của anh sau khi em bấm gửi ở cuối.</div>'
        + actionRow('Mở thư mời 💌','next',false));
    }
    function renderBirthday(){
      frame('<h2>Xác nhận là em ✨</h2>'
        + '<p>Anh chưa chắc mình nhớ đúng ngày sinh của em, nên em nhập lại giúp anh nha 🥺</p>'
        + '<div class="form-row"><div class="field"><label>Ngày</label><input id="birthDay" type="number" min="1" max="31" inputmode="numeric" placeholder="VD: 14" value="'+esc(DATA.birthDay)+'"></div>'
        + '<div class="field"><label>Tháng</label><input id="birthMonth" type="number" min="1" max="12" inputmode="numeric" placeholder="VD: 2" value="'+esc(DATA.birthMonth)+'"></div>'
        + '<div class="field"><label>Năm</label><input id="birthYear" type="number" min="1900" max="2100" inputmode="numeric" placeholder="VD: 2004" value="'+esc(DATA.birthYear)+'"></div></div>'
        + '<div class="note">Thông tin này chỉ dùng cho lời mời first date và sẽ được gửi về cho anh Điền cùng câu trả lời của em.</div>'
        + actionRow('Xác nhận là em ✨','validateBirthday',true));
    }
    function renderInvite(){
      frame('<h2>First date request 💗</h2>'
        + '<p><span class="strong">'+esc(CONFIG.senderName)+'</span> muốn mời <span class="strong">'+esc(CONFIG.recipientName)+'</span> tham gia một buổi first date cùng anh ấy.</p>'
        + '<p>Em có đồng ý không?</p>'
        + '<div class="actions"><button class="btn ghost" data-action="back" type="button">← Quay lại</button><button class="btn primary" data-action="accept" type="button">Có, em đồng ý 💗</button><button class="btn danger" data-action="reject" type="button">Không 😭</button></div>');
    }
    function renderFood(){
      frame('<h2>Trước tiên, mình ăn gì đây?</h2><p>Em chọn một style đồ ăn cho buổi hẹn nha. Các option này chỉ là tượng trưng, anh có thể sửa sau.</p>'
        + cards('foodChoice', OPTIONS.food, DATA.foodChoice, 'three')
        + '<div class="field"><label>Em có món nào đặc biệt muốn ăn không?</label><textarea id="foodNote" placeholder="VD: pasta, sushi, gà rán, hoặc món gì đó anh tự chọn cũng được...">'+esc(DATA.foodNote)+'</textarea></div>'
        + actionRow('Chọn hoạt động tiếp theo →','validateFood',true));
    }
    function renderActivity(){
      frame('<h2>Ăn xong rồi mình làm gì tiếp?</h2><p>Chọn hoạt động sau bữa ăn để anh Điền biết đường chuẩn bị tinh thần nha.</p>'
        + cards('activityChoice', OPTIONS.activities, DATA.activityChoice, '')
        + actionRow('Qua phần outfit cho anh Điền →','validateActivity',true));
    }
    function renderOutfit(){
      frame('<h2>Outfit anh Điền định mặc</h2>'
        + '<p>Anh Điền chốt sẵn một set đi gặp em rồi. Em xem thử có hợp lý không nha 💗</p>'
        + '<div class="outfit-plan">'
        + '<h3>Set đồ dự kiến</h3>'
        + '<div class="outfit-grid">'
        + '<div class="outfit-tile"><span class="outfit-icon">🖤</span><span class="outfit-name">Polo đen</span><span class="outfit-desc">Gọn gàng, đơn giản.</span></div>'
        + '<div class="outfit-tile"><span class="outfit-icon">👖</span><span class="outfit-name">Quần tây</span><span class="outfit-desc">Chỉn chu hơn một chút.</span></div>'
        + '<div class="outfit-tile"><span class="outfit-icon">🧥</span><span class="outfit-name">Áo khoác</span><span class="outfit-desc">Phòng khi trời mát.</span></div>'
        + '<div class="outfit-tile"><span class="outfit-icon">👟</span><span class="outfit-name">Giày trắng</span><span class="outfit-desc">Sạch sẽ, dễ phối.</span></div>'
        + '</div></div>'
        + '<div class="field"><label>Em thấy outfit này ổn không?</label><textarea id="outfitOpinion" placeholder="VD: ổn đó anh, hoặc bỏ áo khoác, hoặc đổi gì đó cho hợp hơn...">'+esc(DATA.outfitOpinion)+'</textarea></div>'
        + '<h3>Chọn mùi hương cho anh Điền</h3>' + cards('perfumeChoice', OPTIONS.perfumes, DATA.perfumeChoice, 'two')
        + actionRow('Chọn ngày giờ hẹn →','validateOutfit',true));
    }
    function renderSchedule(){
      frame('<h2>Em chọn thời gian nha</h2><p>Em chọn ngày giờ phù hợp để anh Điền chuẩn bị thật tử tế.</p>'
        + '<div class="form-row two"><div class="field"><label>Ngày hẹn</label><input id="date" type="date" value="'+esc(DATA.date)+'"></div><div class="field"><label>Giờ hẹn</label><input id="time" type="time" value="'+esc(DATA.time)+'"></div></div>'
        + '<div class="field"><label>Ghi chú cho anh Điền</label><textarea id="note" placeholder="VD: đón em ở đâu, em thích đi nhẹ nhàng hay năng động, có món nào không ăn được không...">'+esc(DATA.note)+'</textarea></div>'
        + actionRow('Kiểm tra lại lịch trình →','validateSchedule',true));
    }
    function row(label, value){ return '<div class="row"><div class="label">'+esc(label)+'</div><div class="value">'+esc(value || 'Chưa nhập')+'</div></div>'; }
    function renderReview(){
      frame('<h2>Đây là lịch trình first date do em chọn 💌</h2><p>Em kiểm tra lại một lần trước khi gửi cho anh Điền nha.</p><div class="review">'
        + row('Người nhận lời mời',CONFIG.recipientName) + row('Người gửi lời mời',CONFIG.senderName)
        + row('Ngày sinh em đã nhập',DATA.birthDay+'/'+DATA.birthMonth+'/'+DATA.birthYear)
        + row('Đồng ý first date', DATA.accepted ? 'Có, em đồng ý 💗' : 'Chưa')
        + row('Món ăn',DATA.foodChoice) + row('Ghi chú món ăn',DATA.foodNote) + row('Hoạt động sau ăn',DATA.activityChoice)
        + row('Outfit anh Điền dự kiến','Polo đen, quần tây, áo khoác, giày trắng')
        + row('Ý kiến của em về outfit',DATA.outfitOpinion) + row('Mùi hương',DATA.perfumeChoice)
        + row('Ngày hẹn',DATA.date) + row('Giờ hẹn',DATA.time) + row('Ghi chú thêm',DATA.note)
        + '</div><div class="actions"><button class="btn ghost" data-action="back" type="button">← Quay lại chỉnh sửa</button><button class="btn primary" data-action="submit" type="button">Gửi câu trả lời cho anh Điền 💌</button></div>');
    }
    function renderThanks(){
      frame('<div class="center"><img class="heart-logo" alt="Trái tim hồng" src="'+HEART+'"><h1>Cảm ơn em Phương 💗</h1><p>Cảm ơn em đã đồng ý đi date cùng anh Điền.</p><p>Anh sẽ chuẩn bị thật tử tế, thật vui, và hy vọng buổi hẹn này sẽ là một kỷ niệm đáng yêu của hai đứa mình.</p></div>'
        + '<div class="mini-game"><div class="mini-game-head"><div><h3>Mini game: bắt tim chờ first date 💕</h3><p>Bật nhạc lên rồi bấm bắt càng nhiều tim càng tốt nha.</p></div><button class="btn primary" data-action="startHeartGame" type="button">Bắt đầu chơi</button></div>'
        + '<div class="game-area" id="heartGameArea"><div class="game-hint" id="gameHint">Nhấn “Bắt đầu chơi” rồi bắt các trái tim xuất hiện trong 20 giây.</div></div>'
        + '<div class="note" id="gameScore">Điểm: 0 · Thời gian: 20s</div></div>');
    }
    function render(){
      var key = steps[stepIndex].key;
      if(key === 'welcome') renderWelcome();
      if(key === 'birthday') renderBirthday();
      if(key === 'invite') renderInvite();
      if(key === 'food') renderFood();
      if(key === 'activity') renderActivity();
      if(key === 'outfit') renderOutfit();
      if(key === 'schedule') renderSchedule();
      if(key === 'review') renderReview();
      if(key === 'thanks') renderThanks();
    }

    function saveInputs(){
      ['birthDay','birthMonth','birthYear','foodNote','outfitOpinion','date','time','note'].forEach(function(id){
        var el = document.getElementById(id);
        if(el) DATA[id] = el.value.trim();
      });
    }
    app.addEventListener('input', saveInputs);
    app.addEventListener('click', function(e){
      autoStartMusic();
      var choose = e.target.closest('[data-choose]');
      if(choose){ DATA[choose.getAttribute('data-choose')] = choose.getAttribute('data-value'); rain(8); render(); return; }
      var btn = e.target.closest('[data-action]');
      if(!btn) return;
      saveInputs();
      var a = btn.getAttribute('data-action');
      if(a === 'back') back();
      if(a === 'next') next();
      if(a === 'validateBirthday') validateBirthday();
      if(a === 'accept') { DATA.accepted = true; rain(20); showModal('Chúc mừng 🎉','Em đã mở khóa thành công buổi first date với anh Điền. Từ giờ, em sẽ là người quyết định lịch trình của buổi hẹn này.',[{label:'Bắt đầu chọn lịch trình',className:'primary',fn:function(){hideModal();next();}}]); }
      if(a === 'reject') showModal('Tính năng đang bảo trì','Tính năng “Không” hiện đang bảo trì. Vui lòng chọn lại một lựa chọn dễ thương hơn 💅',[{label:'Chọn lại nha',className:'primary',fn:hideModal}]);
      if(a === 'validateFood') { if(!DATA.foodChoice) toastMsg('Em chọn giúp anh một kiểu món ăn nha 🍝'); else next(); }
      if(a === 'validateActivity') { if(!DATA.activityChoice) toastMsg('Em chọn một hoạt động sau khi ăn giúp anh nha ☕'); else next(); }
      if(a === 'validateOutfit') validateOutfit();
      if(a === 'validateSchedule') validateSchedule();
      if(a === 'startHeartGame') startHeartGame(btn);
      if(a === 'submit') submit(btn);
    });

    function validateBirthday(){
      var d = Number(DATA.birthDay), m = Number(DATA.birthMonth), y = Number(DATA.birthYear);
      if(!d || !m || !y){ toastMsg('Em nhập đủ ngày, tháng, năm giúp anh nha 🥺'); return; }
      if(d < 1 || d > 31 || m < 1 || m > 12 || y < 1900 || y > 2100){ toastMsg('Ngày sinh có vẻ hơi lạ rồi, em kiểm tra lại giúp anh nha.'); return; }
      next();
    }
    function validateOutfit(){
      if(!DATA.outfitOpinion){ toastMsg('Em góp ý giúp anh về outfit một chút nha 🥺'); return; }
      if(!DATA.perfumeChoice){ toastMsg('Em chọn giúp anh một mùi hương nha 🫧'); return; }
      next();
    }
    function validateSchedule(){
      if(!DATA.date || !DATA.time){ toastMsg('Em chọn giúp anh ngày và giờ hẹn nha 📅'); return; }
      next();
    }
    var heartGameTimer = null, heartSpawnTimer = null;
    function startHeartGame(btn){
      var area = document.getElementById('heartGameArea');
      var scoreBox = document.getElementById('gameScore');
      var hint = document.getElementById('gameHint');
      if(!area || !scoreBox) return;
      autoStartMusic();
      clearInterval(heartGameTimer); clearInterval(heartSpawnTimer);
      area.querySelectorAll('.heart-pop').forEach(function(el){ el.remove(); });
      var score = 0, time = 20;
      if(btn){ btn.disabled = true; btn.textContent = 'Đang chơi...'; }
      if(hint) hint.textContent = 'Bắt tim nào 💗';
      function update(){ scoreBox.textContent = 'Điểm: ' + score + ' · Thời gian: ' + time + 's'; }
      function spawn(){
        var heart = document.createElement('button');
        heart.type = 'button'; heart.className = 'heart-pop'; heart.textContent = ['💗','💖','💕','💘'][Math.floor(Math.random()*4)];
        var maxX = Math.max(20, area.clientWidth - 64);
        var maxY = Math.max(20, area.clientHeight - 64);
        heart.style.left = Math.floor(Math.random()*maxX) + 'px';
        heart.style.top = Math.floor(Math.random()*maxY) + 'px';
        heart.addEventListener('click', function(){ score++; update(); heart.remove(); rain(3); });
        area.appendChild(heart);
        setTimeout(function(){ if(heart.parentNode) heart.remove(); }, 1200);
      }
      update();
      heartSpawnTimer = setInterval(spawn, 520);
      heartGameTimer = setInterval(function(){
        time--; update();
        if(time <= 0){
          clearInterval(heartGameTimer); clearInterval(heartSpawnTimer);
          area.querySelectorAll('.heart-pop').forEach(function(el){ el.remove(); });
          if(hint) hint.innerHTML = 'Hết giờ rồi 💗<br>Em bắt được ' + score + ' trái tim cho buổi hẹn này.';
          scoreBox.textContent = score >= 18 ? 'Điểm: ' + score + ' · Quá giỏi, first date này hơi nhiều tim rồi đó.' : 'Điểm: ' + score + ' · Vừa đủ dễ thương để đi date rồi.';
          if(btn){ btn.disabled = false; btn.textContent = 'Chơi lại'; }
        }
      }, 1000);
    }

    function payload(){
      return {
        _subject:'Phương đã gửi lựa chọn first date 💗',
        source:'First Date Invitation.exe', recipient_name:CONFIG.recipientName, sender_name:CONFIG.senderName,
        birth_day:DATA.birthDay, birth_month:DATA.birthMonth, birth_year:DATA.birthYear,
        date_acceptance:DATA.accepted ? 'Có, em đồng ý' : 'Chưa đồng ý',
        food_choice:DATA.foodChoice, custom_food_note:DATA.foodNote, after_meal_activity:DATA.activityChoice,
        planned_outfit:'Polo đen, quần tây, áo khoác, giày trắng', outfit_opinion:DATA.outfitOpinion, perfume_choice:DATA.perfumeChoice,
        selected_date:DATA.date, selected_time:DATA.time, extra_note:DATA.note,
        submitted_at:new Date().toLocaleString('vi-VN',{hour12:false})
      };
    }
    function downloadJson(obj){
      var blob = new Blob([JSON.stringify(obj,null,2)], {type:'application/json'});
      var url = URL.createObjectURL(blob); var a = document.createElement('a');
      a.href = url; a.download = 'first-date-response.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    }
    function submit(btn){
      var data = payload();
      btn.disabled = true; btn.textContent = 'Đang gửi...';
      if(!CONFIG.formspreeEndpoint){
        localStorage.setItem('first-date-last-response', JSON.stringify(data));
        downloadJson(data);
        rain(28);
        showModal('Bản demo đã lưu dữ liệu','Vì chưa có Formspree endpoint nên trang đã tải xuống file JSON để anh kiểm tra. Khi anh dán endpoint vào CONFIG.formspreeEndpoint, nút này sẽ gửi email thật.',[
          {label:'Xem màn cảm ơn demo',className:'primary',fn:function(){hideModal();go(steps.length-1);}},
          {label:'Đóng',className:'ghost',fn:function(){hideModal();btn.disabled=false;btn.textContent='Gửi câu trả lời cho anh Điền 💌';}}
        ]);
        return;
      }
      fetch(CONFIG.formspreeEndpoint, {method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body:JSON.stringify(data)})
        .then(function(res){ if(!res.ok) throw new Error('Không gửi được form.'); rain(28); go(steps.length-1); })
        .catch(function(err){ btn.disabled=false; btn.textContent='Gửi câu trả lời cho anh Điền 💌'; showModal('Gửi chưa thành công','Có lỗi khi gửi email: '+err.message+' Anh kiểm tra lại Formspree endpoint hoặc kết nối mạng nha.',[{label:'Đóng',className:'primary',fn:hideModal}]); });
    }

    setTimeout(render, 950);
  </script>
</body>
</html>
